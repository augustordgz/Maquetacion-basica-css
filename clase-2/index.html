<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <title>Maquetación básica + CSS</title>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-dot">X</div>
            X-GPT
        </div>
        <button class="new-chat-btn">+ Nuevo Chat</button>
        <div class="sidebar-label">Recientes</div>
        <div class="chat-history">
            <div class="history-item-active">Maquetación básica + CSS</div>
            <div class="history-item"><a href="maquetacion.html">Maquetación básica</a></div>
        </div>
        <div class="sidebar-user">
            <div class="sidebar-user-avatar"></div>
            <span class="avatar-name">Augusto M. Rodriguez C.</span>
        </div>
    </aside>
    <main class="main">
        <header class="topbar">
            <div class="model-selector">
                X-GPT
                <span class="model-selector-pro">PRO</span>
            </div>
            <div class="topbar-btns">
                <button id="tema" class="tema-btn" title="Tema"><span class="material-symbols-outlined">invert_colors</span></button>
                <button class="compartir-btn" title="Compartir"><span class="material-symbols-outlined">share</span></button>
                <button class="configuracion-btn" title="Configuración"><span class="material-symbols-outlined">settings</span></button>
            </div>
        </header>
        <div class="main-text">
            <h2 class="main-h2">¿En que puedo ayudarte hoy?</h2>
            <p class="main-p">Soy X-GPT, tu inteligencia artificial favorita. Hazme cualquier pregunta para comenzar</p>
        </div>
        <div class="input-area">
            <div class="input-box">
                <div class="input-row">
                     <textarea id="chat-input" rows="1" placeholder="Escribe un mensaje…"></textarea>
                    <button class="enviar-btn" title="Enviar"><span class="material-symbols-outlined">send</span></button>
                </div>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
